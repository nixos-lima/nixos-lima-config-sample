images:
  - location: "https://github.com/nixos-lima/nixos-lima/releases/download/v0.1/nixos-lima-v0.1-aarch64.qcow2"
    arch: "aarch64"
    digest: "sha512:2754cc6e734450f41aba3c413def9d41bf788168a451c10e48075bb3cff1c3ecf52faba5870347170f4b56713388ec78a09849b8271d15aaf1aba6cb766c1a19"
  - location: "https://github.com/nixos-lima/nixos-lima/releases/download/v0.1/nixos-lima-v0.1-x86_64.qcow2"
    arch: "x86_64"
    digest: "sha512:2359d8f6683e2896ebc3342024dca3d7c9cc0d98e1c73faca141ff195d8097a82c80248683f9f5c394c8fe711629b1b37bb9d3cba941cd72841da9af15fe6e55"

mounts:
- location: "~"
  writable: false
  9p:
    # Try choosing "mmap" or "none" if you see a stability issue with the default "fscache".
    cache: "mmap"
- location: "/tmp/lima"
  writable: true
  9p:
    cache: "mmap"

memory: 8GiB

portForwards:
  # Tell Lima's port-forwarding to ignore port 68 to prevent interception of host DHCP packets
  # Apparently this is an issue with NixOS that does not occur on other Linux distros
  # See: https://github.com/nixos-lima/nixos-lima/issues/50
  - proto: udp
    guestPort: 68
    guestIP: 0.0.0.0
    ignore: true

containerd:
  system: false
  user: false
